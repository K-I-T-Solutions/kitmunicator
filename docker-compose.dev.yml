# ============================================================
# KITmunicator – DEV (Cisco-Server)
#
# Setzt voraus:
#   - core_network existiert (wird vom infra-Stack verwaltet)
#   - central_postgres läuft (shared DB-Server)
#   - keycloak läuft unter dem Namen "keycloak" im core_network
#   - n8n läuft unter "n8n" im core_network
#
# Starten: make dev-up
# ============================================================

networks:
  # Bestehendes Netzwerk einbinden – NICHT neu anlegen
  core_network:
    external: true

volumes:
  asterisk_config_dev:
  asterisk_sounds_dev:

services:

  # ── Backend ────────────────────────────────────────────────
  kitmunicator_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: kitmunicator_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DEBUG: "true"
      FIREBASE_SERVICE_ACCOUNT_FILE: /etc/firebase-adminsdk.json
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-kitmunicator}
    volumes:
      # Hot-Reload: Quellcode direkt einbinden
      - ./backend:/app
      - ./mobile/kitmunicator-firebase-adminsdk-fbsvc-72c93a0022.json:/etc/firebase-adminsdk.json:ro
    expose:
      - "8000"
    depends_on:
      - kitmunicator_asterisk
    networks:
      - core_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Frontend (Vite Dev Server) ─────────────────────────────
  kitmunicator_ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: kitmunicator_ui
    restart: unless-stopped
    env_file: .env
    volumes:
      # Hot-Reload
      - ./frontend:/app
      - /app/node_modules
    expose:
      - "5173"
    networks:
      - core_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Asterisk (WebRTC PBX) ──────────────────────────────────
  kitmunicator_asterisk:
    image: andrius/asterisk:20
    container_name: kitmunicator_asterisk
    restart: unless-stopped
    # network_mode host wäre ideal für RTP/NAT, aber bricht
    # core_network-Kommunikation – daher explizite Port-Bindings
    ports:
      # SIP UDP
      - "5060:5060/udp"
      # ARI HTTP (nur lokal – Backend spricht direkt über core_network)
      - "127.0.0.1:8088:8088"
      # WebSocket für SIP.js (WSS via Caddy terminiert)
      - "8089:8089"
      # RTP-Mediaports
      - "10000-10099:10000-10099/udp"
    volumes:
      - ./infra/asterisk:/etc/asterisk:ro
      - asterisk_config_dev:/var/lib/asterisk
      - asterisk_sounds_dev:/var/lib/asterisk/sounds
    networks:
      - core_network
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── coturn (STUN/TURN) ─────────────────────────────────────
  kitmunicator_coturn:
    image: coturn/coturn:4.6-alpine
    container_name: kitmunicator_coturn
    restart: unless-stopped
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      # TURN-Relay-Ports (kleines Fenster für Dev reicht)
      - "49160-49200:49160-49200/udp"
    volumes:
      - ./infra/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    networks:
      - core_network
    healthcheck:
      test: ["CMD", "turnutils_uclient", "-p", "3478", "127.0.0.1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 5s
