# ============================================================
# coturn STUN/TURN Konfiguration – KITmunicator
#
# DEV:  listening-ip = Cisco-Server-IP (192.168.178.100)
# Prod: listening-ip = Hetzner-Server-IP (aus ENV)
# ============================================================

# Öffentliche IP des Servers (Hetzner Prod / Cisco Dev)
external-ip=192.168.178.100

# Lauscht auf allen Interfaces
listening-port=3478
listening-ip=0.0.0.0

# Relay-Ports (müssen in Firewall freigegeben sein)
min-port=49160
max-port=49200

# Realm – muss mit SIP.js-Konfiguration übereinstimmen
realm=kitmunicator.kit-it-koblenz.de

# Statische Credentials für DEV (Prod: use-auth-secret)
lt-cred-mech
user=kitmunicator:kitmunicator_turn_dev

# Nur Relay für IPs außerhalb des eigenen Netzes (Sicherheit)
no-multicast-peers

# TLS deaktiviert – Caddy terminiert TLS vor coturn
# (für Prod könnte man hier TLS aktivieren, aber Caddy reicht)
no-tls
no-dtls

# Verbosity (0=minimal, 3=debug)
verbose

# Fingerprint für TURN-Messages
fingerprint

# Logging
log-file=stdout
