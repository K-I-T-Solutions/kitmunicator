[general]
; TLS wird von Caddy terminiert – Asterisk braucht nur plain HTTP/WS
enabled = yes
bindaddr = 0.0.0.0
bindport = 8088

; WebSocket-Endpunkt für SIP.js (plain WS, Caddy macht WSS draus)
; erreichbar unter ws://asterisk:8089/ws
websocket_enabled = yes
websocket_port = 8089
websocket_write_timeout = 100
