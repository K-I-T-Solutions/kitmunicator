[general]
; Format: wav49 (GSM) für kleine Dateigröße, wav als Fallback
format = wav49|wav
serveremail = voicemail@kit-it-koblenz.de
fromstring = KITmunicator Voicemail
emaildateformat = %A, %d. %B %Y, %H:%M Uhr
emailbody = Hallo ${VM_NAME},\n\nyou haben eine neue Voicemail von ${VM_CALLERID}.\nDauer: ${VM_DUR} Sekunden\n\nBitte rufen Sie zurück oder hören Sie die Nachricht ab.\n\n-- KITmunicator
attach = yes
maxsecs = 120
minsecs = 3
maxgreet = 30
maxmsg = 100
; Voicemail-PIN deaktiviert – Authentifizierung läuft über Keycloak
; (direkter Zugang über *98 + Durchwahl im internen Netz)
skipms = 3000
maxsilence = 10
silencethreshold = 128
operator = yes
envelope = yes
saycid = yes
sendvoicemail = yes
delete = no
tempgreetwarn = yes
; Sprache Deutsch
language = de

; ── Kontext für interne User ──────────────────────────────────────────────────
; Einträge werden dynamisch per Skript / n8n angelegt.
; Format: Durchwahl => PIN,Name,E-Mail
[internal_vm]
; Beispiel (wird durch Onboarding-Workflow befüllt):
; 1001 => 1234,Max Mustermann,max@kit-it-koblenz.de

; ── Kontext für temporäre Konferenz-Voicemail ─────────────────────────────────
[conference_vm]
; 9001 => 0000,Konferenz A,
