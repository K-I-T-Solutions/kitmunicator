[general]
; RTP-Port-Range (muss mit den Docker-Port-Bindings übereinstimmen)
rtpstart=10000
rtpend=10099

; ICE-Support für WebRTC
icesupport=yes

; Docker-interne IP → externe Server-IP mappen.
; Ohne diese Zeile schickt Asterisk nur 172.19.x.x als ICE-Kandidat –
; die ist vom Browser im LAN nicht erreichbar.
; Format: <lokale-Docker-IP>:<externe-IP>
ice_host_candidate=172.19.0.43:192.168.178.100
