; ============================================================
; KITmunicator – PJSIP Konfiguration (WebRTC)
;
; Architektur:
;   Browser (SIP.js) → Caddy (WSS) → Asterisk (plain WS :8089)
;   TLS-Terminierung läuft bei Caddy – Asterisk braucht kein Zertifikat
;
; Durchwahlen: 10xx (z.B. 1001, 1002, ...)
; Onboarding:  Neuer User erbt von "webrtc_endpoint" Template
; ============================================================

; ── Transport ─────────────────────────────────────────────────────────────────

[transport-ws]
type = transport
protocol = ws
bind = 0.0.0.0:8089

; UDP-Transport für Trunk-Verbindung zu Sipgate
[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060
external_media_address = 192.168.178.100
external_signaling_address = 192.168.178.100
local_net = 172.16.0.0/12
local_net = 192.168.0.0/16
local_net = 10.0.0.0/8

; ── WebRTC-Endpoint-Template ──────────────────────────────────────────────────
; Alle internen User-Endpoints erben von diesem Template.
; Per ARI wird nur noch auth + aor + endpoint (mit diesem Template als base)
; dynamisch angelegt.

[webrtc_endpoint](!)
type = endpoint
transport = transport-ws
context = internal
disallow = all
allow = opus
allow = g722
allow = ulaw
allow = alaw
; WebRTC-Pflichtfelder
webrtc = yes
dtls_auto_generate_cert = yes
use_avpf = yes
media_encryption = dtls
dtls_verify = fingerprint
dtls_setup = actpass
; NAT-Traversal
ice_support = yes
force_rport = yes
rewrite_contact = yes
media_use_received_transport = yes
rtp_symmetric = yes
; DTMF via RTP
dtmf_mode = rfc4733
; Presence & Subscriptions
device_state_busy_at = 1
allow_subscribe = yes
sub_min_expiry = 30

[webrtc_aor](!)
type = aor
max_contacts = 3
remove_existing = yes
; Kontakt-Ablauf: 5 Minuten (Browser re-registriert vorher)
default_expiration = 300
minimum_expiration = 60
maximum_expiration = 600
qualify_frequency = 30

[webrtc_auth](!)
type = auth
auth_type = userpass

; ── Voicemail-Endpoint (intern, kein WebRTC) ──────────────────────────────────

[voicemail_endpoint](!)
type = endpoint
transport = transport-udp
context = internal
disallow = all
allow = ulaw
allow = alaw
dtmf_mode = rfc4733

; ── Sipgate SIP-Trunk ─────────────────────────────────────────────────────────
; Zugangsdaten aus Asterisk-Umgebungsvariablen lesen

[sipgate_transport]
type = transport
protocol = udp
bind = 0.0.0.0:5061

[sipgate_auth]
type = auth
auth_type = userpass
username = ${SIPGATE_USERNAME}
password = ${SIPGATE_PASSWORD}

[sipgate_aor]
type = aor
contact = sip:sip.sipgate.de

[sipgate_identify]
type = identify
endpoint = sipgate_trunk
match = sip.sipgate.de

[sipgate_trunk]
type = endpoint
transport = sipgate_transport
context = from_trunk
disallow = all
allow = ulaw
allow = alaw
allow = g722
outbound_auth = sipgate_auth
aors = sipgate_aor
from_user = ${SIPGATE_USERNAME}
from_domain = sip.sipgate.de
dtmf_mode = rfc4733

