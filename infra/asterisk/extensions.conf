; ============================================================
; KITmunicator – Dialplan
;
; Kontexte:
;   internal   – registrierte interne User (10xx)
;   from_trunk – eingehende Anrufe vom Sipgate-Trunk
;   outbound   – ausgehende Anrufe via Sipgate
; ============================================================

[globals]
; Voicemail-Kontext
VOICEMAIL_CONTEXT = internal_vm
; Klingelzeit vor Voicemail (Sekunden)
RING_TIMEOUT = 30
; Sipgate Vorwahl / Rufnummer-Prefix
SIPGATE_OUTBOUND_PREFIX =
; Backend-URL für FCM-Push-Webhook (intern)
BACKEND_URL = http://kitmunicator_backend:8000

; ── Interner Kontext ──────────────────────────────────────────────────────────

[internal]

; Interne Durchwahlen 10xx
; Wenn Endpoint offline: FCM-Push senden, dann bis zu 30 Sek warten und neu versuchen
exten => _10XX,1,NoOp(Interner Anruf: ${CALLERID(num)} → ${EXTEN})
 same => n,Set(FCM_SENT=0)
 same => n,Set(DIAL_ATTEMPTS=0)
 same => n(retry),Set(DIAL_ATTEMPTS=$[${DIAL_ATTEMPTS}+1])
 same => n,GotoIf($[${DIAL_ATTEMPTS} > 6]?voicemail)
 same => n,Dial(PJSIP/${EXTEN},5,tTkK)
 same => n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?done)
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy)
 same => n,GotoIf($["${DIALSTATUS}" = "NOANSWER"]?voicemail)
 same => n,GotoIf($[${FCM_SENT} = 0]?send_fcm)
 same => n,Wait(5)
 same => n,Goto(retry)

exten => _10XX,n(send_fcm),NoOp(Endpoint ${EXTEN} offline — FCM-Push senden)
 same => n,Set(CURLOPT(httpheader)=Content-Type: application/json)
 same => n,Set(FCM_BODY={"caller_id":"${CALLERID(num)}","caller_name":"${CALLERID(name)}","callee_extension":"${EXTEN}","uuid":"${UNIQUEID}"})
 same => n,Set(FCM_RESULT=${CURL(${BACKEND_URL}/telephony/webhook/incoming-call,${FCM_BODY})})
 same => n,NoOp(FCM-Webhook-Antwort: ${FCM_RESULT})
 same => n,Set(FCM_SENT=1)
 same => n,Wait(5)
 same => n,Goto(retry)

exten => _10XX,n(voicemail),VoiceMail(${EXTEN}@${VOICEMAIL_CONTEXT},u)
exten => _10XX,n(done),Hangup()

exten => _10XX,n(busy),VoiceMail(${EXTEN}@${VOICEMAIL_CONTEXT},b)
exten => _10XX,n,Hangup()

; Voicemail abhören: *98 + eigene Durchwahl
exten => _*9810XX,1,NoOp(Voicemail abhören: ${EXTEN:3})
 same => n,VoiceMailMain(${EXTEN:3}@${VOICEMAIL_CONTEXT},s)
 same => n,Hangup()

; Weiterleitung auf externen Anschluss: 0 + Vorwahl + Nummer
exten => _0.,1,NoOp(Ausgehend: ${CALLERID(num)} → ${EXTEN:1})
 same => n,Goto(outbound,${EXTEN:1},1)

; Konferenzraum: 900x
exten => _900X,1,NoOp(Konferenzraum: ${EXTEN})
 same => n,ConfBridge(${EXTEN},default_bridge,default_user)
 same => n,Hangup()

; Echo-Test für Verbindungscheck
exten => 9999,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; ── Ausgehend via Sipgate ─────────────────────────────────────────────────────

[outbound]

; Internationale Nummern (+49...) direkt
exten => _+.,1,NoOp(Ausgehend international: ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@sipgate_trunk,60,tTkK)
 same => n,Hangup()

; Nationale Nummern (0xx)
exten => _0.,1,NoOp(Ausgehend national: ${EXTEN})
 same => n,Set(DIAL_NUM=${SIPGATE_OUTBOUND_PREFIX}${EXTEN})
 same => n,Dial(PJSIP/${DIAL_NUM}@sipgate_trunk,60,tTkK)
 same => n,Hangup()

; ── Eingehend vom Sipgate-Trunk ───────────────────────────────────────────────

[from_trunk]

; Eingehende Anrufe auf die Hauptnummer → Durchwahl 1000 (Zentrale)
exten => s,1,NoOp(Eingehender Trunk-Anruf: ${CALLERID(num)})
 same => n,Goto(internal,1000,1)

; Eingehende Anrufe direkt auf eine Durchwahl (DID)
exten => _10XX,1,NoOp(Eingehend DID: ${EXTEN})
 same => n,Goto(internal,${EXTEN},1)

; Fallback: Besetzt-Signal
exten => i,1,Busy(3)
exten => t,1,Hangup()
